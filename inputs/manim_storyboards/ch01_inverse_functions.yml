scenes:
  -
    scene_id: "why_inverse_functions_matter"
    template: "title_bullets"
    title: "Why Study Inverse Functions?"
    voiceover: "We begin with the practical question of when a function can be reversed. If a formula converts one quantity into another, we often want to go back in the opposite direction. A temperature-conversion formula is a simple example: Celsius to Fahrenheit, then Fahrenheit back to Celsius. But reversal only works if an output identifies one original input. That is why the first idea we need is one-to-one behavior."
    timing:
      lead_in_seconds: 0.15
      hold_after_seconds: 0.45
      minimum_duration_seconds: 4.0
    data:
      bullets:
        - "A function can be viewed as a process that sends an input \\(x\\) to an output \\(y=f(x)\\)."
        - "Some formulas should be reversible, such as converting Celsius to Fahrenheit and back again."
        - "A reversible rule needs each output to come from exactly one input."
  -
    scene_id: "one_to_one_definition"
    template: "definition_math"
    title: "Definition of a One-to-One Function"
    voiceover: "Here is the formal condition. A function is one-to-one when different inputs never collapse to the same output. Equivalently, if two outputs are equal, then the inputs must already be equal. The second statement is often the better proof tool, but both say the same mathematical thing. This is the point where rigor matters: an inverse function can only be defined if every output leads back to one and only one input."
    timing:
      lead_in_seconds: 0.15
      hold_after_seconds: 0.45
      minimum_duration_seconds: 4.0
    data:
      statement: "Different inputs must produce different outputs."
      math_lines:
        - "\\[\nf(x_1)\\ne f(x_2)\n\\qquad \\text{whenever } x_1\\ne x_2.\n\\]"
        - "\\[\nf(x_1)=f(x_2) \\implies x_1=x_2.\n\\]"
      supporting_bullets:
        - "The equivalent implication form is often the easier test in practice."
        - "This is the key property that allows a function to have an inverse."
  -
    scene_id: "student_id_example"
    template: "example_walkthrough"
    title: "A Real-World One-to-One Test"
    voiceover: "This example shows that the definition is about matching, not about algebraic symbols. If each student is matched with a student ID number, the function is one-to-one because each ID belongs to exactly one student. But if each student is matched with a blood type, then many students can share the same output, so the function is not one-to-one. This is the right habit to build early: do not stare at the symbols first. Ask whether one output can be traced back to several different inputs."
    timing:
      lead_in_seconds: 0.15
      hold_after_seconds: 0.45
      minimum_duration_seconds: 4.0
    data:
      steps:
        - "Student ID numbers are unique, so the function is one-to-one."
        - "Blood types repeat across students, so that function is not one-to-one."
        - "The test is always the same: can one output belong to more than one input?"
      takeaway: "Apply the definition to ordinary processes before moving to algebraic functions."
      math_lines:
        - "\\[\nf(\\text{student})=\\text{Student ID number}\n\\]"
        - "\\[\ng(\\text{student})=\\text{Blood type}.\n\\]"
  -
    scene_id: "square_function_inverse_failure"
    template: "example_walkthrough"
    title: "Why \\(x^2\\) Can Fail To Be Invertible"
    voiceover: "Now we move to a standard mathematical example. The identity function on zero to one is one-to-one because every input keeps its own value. In contrast, the square function on minus one to one is not one-to-one: one half and minus one half both give one fourth. That repeated output is not a minor issue. It means the inverse would have to send one fourth back to two different inputs, which is impossible for a function. Not every function has an inverse. A function can have an inverse only if each output corresponds to exactly one input; in other words, the function must be one-to-one. For g of x equals x squared on the interval from minus one to one, the value one fourth comes from both one half and minus one half. Therefore g inverse of one fourth is not well defined."
    timing:
      lead_in_seconds: 0.15
      hold_after_seconds: 0.45
      minimum_duration_seconds: 4.0
    data:
      steps:
        - "\\(f(x)=x\\) on \\([0,1]\\) is one-to-one, but \\(g(x)=x^2\\) on \\([-1,1]\\) is not."
        - "The output \\(\\frac14\\) comes from both \\(\\frac12\\) and \\(-\\frac12\\)."
        - "\\(g^{-1}\\!\\left(\\frac14\\right)\\) is not well defined on the full interval \\([-1,1]\\)."
      takeaway: "See exactly how repeated outputs prevent an inverse from being well defined."
      math_lines:
        - "\\[\nf(x)=x, \\qquad 0\\le x\\le 1,\n\\]"
        - "\\[\ng(x)=x^2, \\qquad -1\\le x\\le 1.\n\\]"
        - "\\[\ng\\left(\\frac12\\right)=\\left(\\frac12\\right)^2=\\frac14\n\\qquad \\text{and} \\qquad\ng\\left(-\\frac12\\right)=\\left(-\\frac12\\right)^2=\\frac14.\n\\]"
  -
    scene_id: "horizontal_line_test_rule"
    template: "definition_math"
    title: "The Horizontal Line Test"
    voiceover: "The horizontal line test is the graph version of the definition. A horizontal line means the output value is fixed at y equals c. If that line meets the graph twice, then the same output c is being produced by two different x-values, so the function cannot be one-to-one. If every horizontal line meets the graph at most once, then every output corresponds to at most one input, which is exactly the condition we need."
    timing:
      lead_in_seconds: 0.15
      hold_after_seconds: 0.45
      minimum_duration_seconds: 4.0
    data:
      statement: "A horizontal line represents a fixed output value \\(y=c\\)."
      math_lines:
        - "\\[\nf(x_1)=c=f(x_2).\n\\]"
      supporting_bullets:
        - "If the graph is hit twice, then two inputs share the same output."
        - "So a function is one-to-one exactly when every horizontal line meets the graph at most once."
  -
    scene_id: "horizontal_line_test_figure"
    template: "graph_focus"
    hook: "tools.manim_templates.hooks.horizontal_line_test_comparison"
    title: "Horizontal Line Test: Visual Check"
    voiceover: "This figure lets us read the test directly. On the left, the horizontal line intersects only once, so the graph is still consistent with a one-to-one function. On the right, the horizontal line meets the parabola twice, which tells us immediately that one output value is coming from two inputs. That visual failure is exactly why an inverse cannot be defined on the entire interval."
    timing:
      lead_in_seconds: 0.15
      hold_after_seconds: 0.45
      minimum_duration_seconds: 4.0
    data:
      axes:
        x_range:
          - -3
          - 3
          - 1
        y_range:
          - -1
          - 4
          - 1
        x_length: 6.2
        y_length: 4.2
        include_numbers: false
        tips: true
      plots:
