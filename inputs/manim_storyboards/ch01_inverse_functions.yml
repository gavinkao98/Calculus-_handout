      annotations:
        -
          text: "Left panel: one horizontal hit still behaves like a one-to-one graph."
        -
          text: "Right panel: the same horizontal level hits twice, so one output comes from two inputs."
      source_figure_tex: "\\centering\n\\begin{minipage}{0.46\\textwidth}\n\\centering\n\\begin{tikzpicture}[scale=0.9]\n\\draw[->] (-2.3,0) -- (2.1,0) node[right] {$x$};\n\\draw[->] (0,-2.1) -- (0,2.2) node[above] {$y$};\n\\draw[blue, thick] (-1.5,-1.5) -- (1.3,1.3);\n\\draw[red, dashed] (-2.1,1) -- (1.3,1);\n\\fill (1,1) circle (2pt);\n\\node[blue] at (1.4,1.55) {$f(x)$};\n\\node[below right] at (0.85,1) {$(x_1,c)$};\n\\node[red, right] at (1.35,1) {$y=c$};\n\\end{tikzpicture}\n\n\\vspace{0.4em}\nOne-to-one function\\\\\nIntersects at most once.\n\\end{minipage}\n\\hfill\n\\begin{minipage}{0.46\\textwidth}\n\\centering\n\\begin{tikzpicture}[scale=0.9]\n\\draw[->] (-2.3,0) -- (2.1,0) node[right] {$x$};\n\\draw[->] (0,-2.1) -- (0,2.2) node[above] {$y$};\n\\draw[blue, thick, domain=-1.35:1.35, samples=100] plot (\\x,{1.15*\\x*\\x});\n\\draw[red, dashed] (-1.85,1.25) -- (1.85,1.25);\n\\fill (-1.04,1.25) circle (2pt);\n\\fill (1.04,1.25) circle (2pt);\n\\node[blue] at (1.5,2.15) {$f(x)$};\n\\node[above left] at (-1.2,1.25) {$(x_1,c)$};\n\\node[above right] at (1.2,1.25) {$(x_2,c)$};\n\\node[red, right] at (1.9,1.25) {$y=c$};\n\\end{tikzpicture}\n\n\\vspace{0.4em}\nNot one-to-one\\\\\nIntersects more than once.\n\\end{minipage}"
  -
    scene_id: "inverse_function_definition"
    template: "definition_math"
    title: "Definition of an Inverse Function"
    voiceover: "Once a function is one-to-one, we can define its inverse. If the original function sends x to y, then the inverse sends y back to x. That is why the domain and range switch roles. The outputs of the original function become the allowed inputs of the inverse. Sometimes the notation is rewritten with x as the input variable for the inverse, but that is only a relabeling. The mathematical content is still that the inverse reverses the original correspondence."
    timing:
      lead_in_seconds: 0.15
      hold_after_seconds: 0.45
      minimum_duration_seconds: 4.0
    data:
      statement: "If \\(f\\) sends \\(x\\) to \\(y\\), then \\(f^{-1}\\) sends \\(y\\) back to \\(x\\)."
      math_lines:
        - "\\[\nf^{-1}(y)=x\n\\quad \\Longleftrightarrow \\quad\nf(x)=y,\n\\qquad y\\in B.\n\\]"
        - "\\[\nf^{-1}(x)=y\n\\quad \\Longleftrightarrow \\quad\nf(y)=x.\n\\]"
      supporting_bullets:
        - "The domain and range switch roles when we pass to the inverse."
        - "Using \\(x\\) as the input variable for \\(f^{-1}\\) is only a notation change, not a new idea."
  -
    scene_id: "inverse_existence_theorem"
    template: "definition_math"
    title: "When Does an Inverse Exist?"
    voiceover: "This theorem gives the complete criterion: a function has an inverse if and only if it is one-to-one. So the property we studied earlier is not just helpful; it is exactly the right condition. The examples show how the theorem turns into computation. The identity function stays unchanged under inversion, and for x cubed we solve y equals x cubed for x, then interchange x and y to get the cube root function."
    timing:
      lead_in_seconds: 0.15
      hold_after_seconds: 0.45
      minimum_duration_seconds: 4.0
    data:
      statement: "A function has an inverse function if and only if it is one-to-one."
      math_lines:
        - "\\[\n    f^{-1}(x)=x.\n    \\]"
        - "\\[\n    g^{-1}(x)=\\sqrt[3]{x}.\n    \\]"
      supporting_bullets:
        - "Being one-to-one is both necessary and sufficient."
        - "Quick checks: \\(f(x)=x\\) and \\(g(x)=x^3\\) are both invertible."
  -
    scene_id: "finding_inverse_procedure"
    template: "procedure_steps"
    title: "Three Steps For Finding An Inverse"
    voiceover: "Once we know an inverse exists, there is a standard algebraic procedure for finding it. First write y equals f of x. Next solve that equation for x in terms of y. Then interchange x and y. That final relabeling is not cosmetic; it rewrites the answer with the inverse viewed as a new function of x."
    timing:
      lead_in_seconds: 0.15
      hold_after_seconds: 0.45
      minimum_duration_seconds: 4.0
    data:
      steps:
        - "Write \\(y=f(x)\\)."
        - "Solve this equation for \\(x\\) in terms of \\(y\\)."
        - "Interchange \\(x\\) and \\(y\\) to obtain \\(f^{-1}(x)\\)."
      worked_equations:
        - "\\[\ny=f(x).\n\\]"
        - "\\[\nx=\\text{solve in terms of } y.\n\\]"
        - "\\[\nf^{-1}(x)\\text{ appears after swapping }x\\text{ and }y.\n\\]"
  -
    scene_id: "shifted_cubic_example"
    template: "example_walkthrough"
    title: "Example: Finding The Inverse Of \\(x^3+2\\)"
    voiceover: "Here the procedure works cleanly. We start with y equals x cubed plus two, solve for x, and then interchange the variables. That gives the inverse function x minus two under a cube root. Because x cubed is already one-to-one on all real numbers, we do not need any domain restriction first."
    timing:
      lead_in_seconds: 0.15
      hold_after_seconds: 0.45
      minimum_duration_seconds: 4.0
    data:
      steps:
        - "Start with \\(y=x^3+2\\) and solve for \\(x\\)."
        - "After isolating \\(x\\), interchange the variables."
        - "A composition check confirms the answer."
      takeaway: "Apply the three-step procedure to a function that is already one-to-one."
      math_lines:
        - "\\[\ny=x^3+2.\n\\]"
        - "\\[\nx=\\sqrt[3]{\\,y-2\\,}.\n\\]"
        - "\\[\nf^{-1}(x)=\\sqrt[3]{\\,x-2\\,}.\n\\]"
  -
    scene_id: "restricted_parabola_example"
    template: "example_walkthrough"
    title: "Example: Restricting The Domain Of \\(x^2\\)"
    voiceover: "This example shows why domain restriction matters. On all of the real numbers, x squared is not one-to-one. But once we restrict the domain to x greater than or equal to zero, every output comes from exactly one input. That is why the inverse becomes the nonnegative square root rather than plus or minus square root."
    timing:
      lead_in_seconds: 0.15
      hold_after_seconds: 0.45
      minimum_duration_seconds: 4.0
    data:
      steps:
        - "On \\([0,\\infty)\\), the function \\(f(x)=x^2\\) becomes one-to-one."
        - "We choose the nonnegative square root because the original domain requires \\(x\\ge 0\\)."
        - "Restricting the domain can make an inverse possible."
      takeaway: "See how a domain restriction can create an inverse for a function that was not invertible before."
      math_lines:
        - "\\[\ny=x^2,\n\\qquad x\\ge 0.\n\\]"
        - "\\[\nx=\\sqrt{y}.\n\\]"
        - "\\[\nf^{-1}(x)=\\sqrt{x},\n\\qquad x\\ge 0.\n\\]"
  -
    scene_id: "composition_identities_figure"
    template: "recap_cards"
    title: "Checking An Inverse By Composition"
    voiceover: "To finish the section, we record the identities that certify an inverse. If you apply a function and then its inverse, you must return to the starting point. If you apply the inverse first and then the function, you must also return to the starting point, provided you begin in the correct set. These are the formulas you should check whenever you want to confirm that a proposed inverse is correct."
    timing:
      lead_in_seconds: 0.15
      hold_after_seconds: 0.45
      minimum_duration_seconds: 4.0
    data:
      points:
        - "\\(f^{-1}(f(x))=x\\) for every \\(x\\in A\\)."
        - "\\(f(f^{-1}(x))=x\\) for every \\(x\\in B\\)."
        - "These identities are the standard verification step after solving for an inverse."
      identities: []
